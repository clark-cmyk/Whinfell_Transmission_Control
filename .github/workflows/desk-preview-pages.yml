name: Desk preview (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'css/**'
      - 'js/**'
      - 'data/hydration/**'
      - 'docs/**'
      - 'scripts/build.sh'
      - 'scripts/build_desk_preview.sh'
      - '.github/workflows/desk-preview-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build desk preview
        run: bash scripts/build_desk_preview.sh

      - name: Verify artifact
        run: |
          test -f dist/index.html
          test -f dist/data/hydration/latest.json
          test -f dist/.nojekyll
          test -f dist/js/core.js
          grep -q 'Transmission Control' dist/index.html
          grep -q 'function renderAll' dist/js/core.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4