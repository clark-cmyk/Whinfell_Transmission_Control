# Disabled — real site is published locally to gh-pages via scripts/publish_ghpages.sh
# (hydration bundle ships from Clark's machine, not CI).
name: Desk preview (GitHub Pages)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify build_web script exists
        run: test -f scripts/build_web.sh && test -f scripts/publish_ghpages.sh

      - name: Note
        run: |
          echo "Pages deploy is local-only: bash scripts/publish_ghpages.sh"
          echo "Enable Pages: Settings → Branch gh-pages / (root)"