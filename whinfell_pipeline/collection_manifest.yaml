      Optional US–PRC gov flows enrichment. Same flows_* contract via normalize_rules.

# Minimum files before auto-pipeline runs (required batch ids)
required_batch_ids:
  - koyfin_rates
  - barchart_futures_intraday
  - barchart_futures_daily

