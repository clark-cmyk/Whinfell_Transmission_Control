# ---------------------------------------------------------------------------
# Canonical universes (import-driven, not catch-all research)
# ---------------------------------------------------------------------------
universes:
  koyfin_watchlists:
    WTM-Import-Core:
      role: source_of_truth
      description: Canonical cross-section import universe (limited WTM operating set)
      status: active
      replaces: ad_hoc WhinPump-only validation
      tickers_ref: koyfin_import_core
    WTM-Research-Sandbox:
      role: deprecated_for_ingest
      description: Exploratory list — never auto-ingested
      status: planned

  koyfin_import_core:
    status: active_partial
    note: >
      Cross-section snapshot only. GC1, HG1, SOFR are continuous-price fields in Koyfin —
      not term structure. Calendar spreads, contract curves, and roll context require
      universes.barchart_term_structure (Barchart).
    tickers:
      - BTCUSD
      - ETHUSD
      - XRPUSD
      - SOLUSD
      - HYG
      - JAAA
      - BKLN
      - CWB
      - CBON
      - KHYB
      - SPY
      - QQQ
      - XLRE
      - SOFR
      - GC1
      - HG1

  koyfin_china_policy:
    status: locked
    saved_view: WTM-China-Policy
    note: "FINAL LOCK — no further ticker changes for China Policy."
    tickers:
      - KWEB
      - "000300.SS"
      - HSTECH
      - ASHR
      - KHYB
      - CBON
    koyfin_tickers:
      - KWEB
      - SHSZ300
      - "551550"
      - ASHR
      - KHYB
      - CBON
    koyfin_ticker_map:
      "000300.SS": SHSZ300
      HSTECH: "551550"
    industrial_proxy:
      symbol: HG1
      source: barchart
      barchart_screen: WTM-China-Cyclical

  barchart_core:
    role: source_of_truth
    description: Always-on multi-ticker historical download set
    symbols:
      - "^BTCUSD"
      - "^ETHUSD"
      - "^XRPUSD"
      - "^SOLUSD"
      - IBIT
      - GBTC
      - SOFR
      - "$HSI"
      - "$VHSI"
      - "$VXHY"
      - CBON
      - KHYB
      - ASHR
      - DXY00
      - GCY00
      - HGY00

  barchart_term_structure:
    vendor: barchart
    status: active
    description: >
      Sole authority for futures term structure, calendar spreads, contract curves,
      and ladder/basis roll context. Koyfin does not expose term structures — do not
      create a Koyfin WTM-Import-Curves watchlist.
    screens_ref: watchlist_names.barchart_screens
    active_screens:
      - WTM-BTC-Basis
      - WTM-China-Cyclical
      - WTM-China-Basis
      - WTM-China-Futures-Daily
      - WTM-Futures-Daily
    universe_ref: barchart_curves
    manifest_ref: collection_manifest.yaml#tickers
    ladder_shortcuts: [BT1, ER1, SA1, SJ1, GC1, ES1, ZN1, CL1, SQ1, OY1, QR1, DX1, "VI*1"]
    csv_types: [Futures Spreads, "Historical Data"]
    cancelled_koyfin_watchlist:
      name: WTM-Import-Curves
      reason: Koyfin has no futures term-structure export
      superseded_by: barchart_term_structure

  barchart_curves:
    role: curve_only
    vendor: barchart
    description: Contract curves, strips, and structured spreads — not daily core ingest
    universe_ref: barchart_term_structure
    symbol_groups:
      fx_futures: [DXM26, E6M26, J6M26, A6M26]
      metals_curves: [GCN26, GCQ26, GCU26, GCV26, GCX26, GCZ26, GCF27, HGN26, HGQ26]
      energy_curves: [CLQ26, CLG27, CLV26, CLU26, CLZ26, CLX26, CLF27, NGQ26]
      btc_futures_curves: [BTM26, BTN26, BTQ26, BTU26, BTV26, BTX26, BTZ26, BTH27]
      sofr_curves: [TAN26, TAQ26, TAU26, TAV26, TAX26, TAZ26, TAH27]
      rates_strips: [ZMN26, ZLN26, ZBU26, ZFM26, ZNU26, ZQM26]
      hy_contracts: [OYU26, OYZ26, OYH27, OGU26, OGZ26, OGH27]
      misc_contracts: [LUN26, FLM26, LVN26, QRU26, "S!N26", SQJ26, U7M26, VIN26, YCN26, YQN26]
      structured_spreads:
        - _S_IV_ZBU6_UDU6
        - _S_RT_ZBU6_ZBZ6
        - _S_BF_ZBU6_ZBZ6_ZBH7
        - _S_RT_ZBU6_ZBH7
        - _S_RT_ZBZ6_ZBH7

