        - {ticker: GBTC, asset_id: gbtc, role: trust_proxy, primary: false, weight: 0.25}

funds_flow_thresholds:
  version: "1.0"
  supportive_5d_pct: 0.15
  weak_5d_pct: 0.05
  divergence_5d_pct: -0.05
  breadth_supportive_ratio: 0.60
  concentration_single_etf: 0.70
  primary_divergence_weight: 2.0

funds_flow_column_patterns:
  flow_usd_1d: ["{TICKER} Flow (D)", "Fund Flows/Periodic (D)"]
  aum_usd: ["{TICKER} AUM", "AUM"]
  flow_pct_aum_1d: ["{TICKER} Flow % AUM (D)"]
  date: ["Date"]

funds_flow_ingest:
  version: "1.0"
  status: Locked
  sidecar_path: "data/flows/v1/latest_flows.json"
  sidecar_version: "1.0.0"
  source_channel_primary: koyfin_wtm_flows
  source_channel_fallback: credit_cross_section_fallback
  ingest_modes: [timeseries_primary, fallback_1d_only, disabled]
  units:
    flow_usd: millions_usd
    aum_usd: millions_usd
    flow_pct_aum: percent
  basket_coverage_min_ratio: 0.60
  series_tail_sessions: 20
  flows_meta:
    flows_status: [ok, partial, fallback_1d, unavailable]
    flows_source: [wtm_flows_timeseries, credit_cross_section, none]
    degrade_modes: [full, partial_basket, fallback_1d_credit, unavailable]
    fallback_reasons:
      - missing_wtm_flows_file
      - credit_cross_section_1d_only
      - missing_basket_etfs
      - ticker_columns_absent
      - non_credit_node_no_fallback
    flows_confidence_penalty_range: [0, 2]

# ---------------------------------------------------------------------------
# Transmission output blocks (hydration bundle + WTM export extensions)
# ---------------------------------------------------------------------------
transmission_outputs:
  hydration_bundle:
    version: "1.2.0"
    blocks:
      global: {source: parquet, fields: [whinfell_score, transmission_state, regime_tag, key_observation, btc_bias]}
      china: {source: parquet, fields: [sq3_score, sq3_band, policy_strength, state_impulse_score]}
      china_ladder: {source: derived, fields: [horizons, weakest_china_stage]}
      crypto_sleeve: {source: data/crypto/v1/latest_crypto_sleeve.json, fields: [assets, charts, correlation_series, snapshot]}
      execution: {source: data/execution/v1/latest_execution.json, fields: [near_month, basis_spread, btc_bias]}
      suggested_tracer: {source: derived, confirm_required: true}
      node_cockpits: {source: derived, nodes: [liquidity, credit, breadth, highbeta, basis]}
      cockpit_context: {source: derived, fields: [weakest_node_id, gate_zone, whinfell_score]}
  flows_sidecar:
    source: data/flows/v1/latest_flows.json
    fields: [as_of, ingest_mode, tickers]
  output_kinds:
    snapshot: cross_sectional current-state validation
    historical_timeseries: dated price/level series
    correlation_series: dated pairwise correlation series
    curve_series: contract-level term structure
    derived_signals: whinfell_score, sq3_score, china_ladder, btc_bias