# ---------------------------------------------------------------------------
# Ticker standards — vendor format rules
# ---------------------------------------------------------------------------
ticker_standards:
  koyfin:
    format: uppercase_plain
    examples: [BTCUSD, HYG, US10Y, GCN10YR]
    provides: [snapshot_csv, dated_series_charts, correlation_exports, macro_panels]
    does_not_provide: [futures_term_structure, calendar_spreads, contract_curves, roll_context]
  barchart_crypto:
    format: caret_prefix
    examples: ["^BTCUSD", "^ETHUSD"]
  barchart_index:
    format: dollar_prefix
    examples: ["$HSI", "$VHSI", "$VXHY"]
  barchart_futures:
    format: contract_code
    examples: [BTM26, GCY00, HGY00]
    provides: [futures_historical, futures_spreads, contract_curves, term_structure, roll_context]
    term_structure_authority: true
  resolution: canonical_assets

